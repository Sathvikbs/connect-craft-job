<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Contact · JobConnect</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/auth.css"><link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <header class="page-head"><div class="container"><h1>Get in touch</h1><p>Have a question or feedback? We'd love to hear from you.</p></div></header>
  <main class="container section">
    <div class="grid grid-2">
      <div class="card">
        <h3>Contact form</h3>
        <form id="contactForm" class="mt-2">
          <div class="form-group"><label>Your name</label><input class="form-control" name="name" required></div>
          <div class="form-group"><label>Email</label><input class="form-control" type="email" name="email" required></div>
          <div class="form-group"><label>Subject</label><input class="form-control" name="subject"></div>
          <div class="form-group"><label>Message</label><textarea class="form-control" rows="4" name="message" required></textarea></div>
          <button class="btn btn-primary">Send message</button>
        </form>
      </div>
      <div class="card">
        <h3>Reach us directly</h3>
        <p>📧 <b>Email:</b> hello@jobconnect.example</p>
        <p>📞 <b>Phone:</b> +91 98765 43210</p>
        <p>📍 <b>Address:</b> 5th Floor, MG Road, Bengaluru, India</p>
        <p>🕒 <b>Hours:</b> Mon–Fri, 9am–7pm IST</p>
        <div class="mt-3">
          <h4>Follow us</h4>
          <div class="flex gap-2">
            <a class="chip">Twitter</a><a class="chip">LinkedIn</a><a class="chip">Instagram</a>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script type="module" src="js/app.js"></script>
  <script type="module">
    import { toast } from './js/utils.js';
    document.getElementById('contactForm').addEventListener('submit', e => {
      e.preventDefault(); e.target.reset();
      toast('Message sent — we will reply within 24 hours', 'success');
    });
  </script>
</body>
</html>
