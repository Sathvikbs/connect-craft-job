<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Resume builder · JobConnect</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/dashboard.css"><link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <header class="page-head">
    <div class="container flex-between" style="flex-wrap:wrap;gap:12px">
      <div><h1>Resume builder</h1><p>Craft a modern resume in minutes and download instantly.</p></div>
      <div class="flex gap-2">
        <button class="btn btn-ghost" id="saveResume">💾 Save draft</button>
        <button class="btn btn-ghost" id="printResume">🖨 Print</button>
        <button class="btn btn-primary" id="downloadResume">⬇ Download</button>
      </div>
    </div>
  </header>
  <main class="container">
    <div class="resume-layout">
      <form class="resume-form" id="resumeForm" onsubmit="return false">
        <div class="tmpl-picker">
          <button type="button" data-tmpl="classic" class="active">Classic</button>
          <button type="button" data-tmpl="modern">Modern</button>
          <button type="button" data-tmpl="minimal">Minimal</button>
        </div>

        <h3>Personal information</h3>
        <div class="form-group"><label>Photo</label><input type="file" name="photo" accept="image/*" class="form-control"></div>
        <div class="grid grid-2">
          <div class="form-group"><label>Full name</label><input name="fullName" class="form-control"></div>
          <div class="form-group"><label>Title / role</label><input name="title" class="form-control"></div>
          <div class="form-group"><label>Email</label><input name="email" class="form-control"></div>
          <div class="form-group"><label>Phone</label><input name="phone" class="form-control"></div>
          <div class="form-group" style="grid-column:1/-1"><label>Location</label><input name="location" class="form-control"></div>
          <div class="form-group" style="grid-column:1/-1"><label>About / objective</label><textarea name="about" rows="3" class="form-control"></textarea></div>
        </div>

        <h3 class="mt-3">Skills & languages</h3>
        <div class="form-group"><label>Skills (comma separated)</label><input name="skills" class="form-control"></div>
        <div class="form-group"><label>Languages (comma separated)</label><input name="languages" class="form-control"></div>

        <div class="panel-head mt-3"><h3 style="margin:0">Education</h3><button type="button" class="btn btn-sm btn-primary" id="add-education">+ Add</button></div>
        <div id="rep-education"></div>

        <div class="panel-head mt-3"><h3 style="margin:0">Experience</h3><button type="button" class="btn btn-sm btn-primary" id="add-experience">+ Add</button></div>
        <div id="rep-experience"></div>

        <div class="panel-head mt-3"><h3 style="margin:0">Projects</h3><button type="button" class="btn btn-sm btn-primary" id="add-projects">+ Add</button></div>
        <div id="rep-projects"></div>

        <div class="panel-head mt-3"><h3 style="margin:0">Certifications</h3><button type="button" class="btn btn-sm btn-primary" id="add-certifications">+ Add</button></div>
        <div id="rep-certifications"></div>

        <div class="form-group mt-3"><label>Achievements</label><textarea name="achievements" rows="2" class="form-control"></textarea></div>
      </form>
      <div class="resume-preview" id="resumePreview"></div>
    </div>
  </main>
  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/resume.js"></script>
</body>
</html>
